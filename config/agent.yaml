agent:
  model: "gpt-4.1-mini"
  temperature: 0.1
  max_iterations: 15
  verbose: false

llm:
  provider: "litellm"
  base_url: "http://localhost:4000/v1"
  api_key: "sk-1234"

tools:
  enabled:
    - web_search
    - database_query
    - email_send
    - user_data_lookup
    - file_read
    - api_call
    - calendar_manage
    - code_execute
    - knowledge_base_search
    - report_generate

execution:
  mode: "dry_run"
  require_approval: false
